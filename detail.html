<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle del Pokémon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Información del Pokémon</h1>

    <p id="detailStatus">Cargando información...</p>

    <div id="detailCard" class="pokemon-card hidden">
      <img id="detailImage" src="" alt="Imagen del Pokémon" />
      <h2 id="detailName"></h2>
      <p id="detailBaseInfo"></p>
      <p id="detailTypes"></p>
      <p id="detailAbilities"></p>
      <p id="detailStats"></p>
      <button id="backBtn">Volver</button>
    </div>
  </div>

  <script src="detail.js"></script>
</body>
</html>
