<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon App</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <h1>Buscador de Pokémon</h1>

    <div class="search-box">
      <input type="text" id="pokemonInput" placeholder="Ejemplo: pikachu" />
      <button id="searchBtn">Buscar</button>
    </div>

    <div class="examples">
      <p><strong>Ejemplos:</strong></p>
      <ul>
        <li>pikachu</li>
        <li>charizard</li>
        <li>bulbasaur</li>
        <li>squirtle</li>
        <li>mewtwo</li>
      </ul>
    </div>

    <p id="statusMessage"></p>

    <div id="pokemonCard" class="pokemon-card hidden">
      <img id="pokemonImage" src="" alt="Imagen del Pokémon" />
      <h2 id="pokemonName"></h2>
      <p id="pokemonDescription"></p>
      <button id="moreInfoBtn" class="hidden">Ver más</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
